<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #202124;
      color: #fff;
      font-family: system-ui;
      overflow: hidden;
    }
    /* Toolbar (top 50px) */
    .toolbar {
      height: 50px;
      background: #292a2d;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 10px;
      flex-shrink: 0;
    }
    .toolbar input {
      flex: 1;
      padding: 6px 12px;
      border-radius: 15px;
      border: none;
      background: #303134;
      color: #fff;
      outline: none;
    }
    .toolbar button {
      padding: 6px 16px;
      background: #35363a;
      border: none;
      color: #fff;
      border-radius: 15px;
      cursor: pointer;
    }
    .toolbar button:hover { background: #555; }
    
    /* Browser Area (fills rest) */
    #browser {
      flex: 1;
      background: #fff;
      border: none;
    }
  </style>
</head>
<body>
  <!-- Toolbar -->
  <div class="toolbar">
    <button onclick="goBack()">←</button>
    <button onclick="goForward()">→</button>
    <button onclick="reload()">⟳</button>
    <input id="url" placeholder="Enter URL" onkeydown="if(event.key==='Enter')navigate()">
    <button onclick="navigate()">Go</button>
  </div>
  
  <!-- Browser Content (iframe for native WebView) -->
  <iframe id="browser" src="https://www.bing.com" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>

  <script>
    function navigate() {
      let val = document.getElementById('url').value;
      if (!val.startsWith('http')) val = 'https://' + val;
      document.getElementById('browser').src = val;
      document.getElementById('url').value = val;
    }
    
    function goBack() {
      try { document.getElementById('browser').contentWindow.history.back(); } catch(e){}
    }
    
    function goForward() {
      try { document.getElementById('browser').contentWindow.history.forward(); } catch(e){}
    }
    
    function reload() {
      const iframe = document.getElementById('browser');
      iframe.src = iframe.src;
    }
  </script>
</body>
</html>
