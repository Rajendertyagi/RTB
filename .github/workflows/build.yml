name: Build TB Browser (WinUI 3)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_CLI_UI_LANGUAGE: en
  CONFIGURATION: Release
  RUNTIME: win-x64
  EnableWindowsTargeting: true

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ⚙️ Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: 🔁 Configure Git for HTTPS
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
        shell: pwsh

      - name: 📥 Restore Workloads & Dependencies
        run: |
          dotnet workload restore
          dotnet restore
        shell: pwsh

      - name: 🧹 Clean Stale Build Artifacts (Required for WinUI 3)
        run: |
          Remove-Item -Recurse -Force obj, bin -ErrorAction SilentlyContinue
          dotnet clean -c ${{ env.CONFIGURATION }}
        shell: pwsh

      - name: 🔨 Build & Publish (Framework-Dependent)
        run: >
          dotnet publish
          -c ${{ env.CONFIGURATION }}
          -r ${{ env.RUNTIME }}
          --self-contained false
          -o ./publish
          -p:EnableWindowsTargeting=true
          -p:WindowsSdkPackageVersion=10.0.19041.38
        shell: pwsh

      - name: 🧹 Strip Runtime & SDK Files for Minimal Build
        run: |
          Set-Location ./publish
          $keep = @(
            "TB-Browser.exe",
            "TB-Browser.dll",
            "*.deps.json",
            "*.runtimeconfig.json",
            "Dapper.dll",
            "Microsoft.Data.Sqlite.dll",
            "CommunityToolkit.Mvvm.dll",
            "Microsoft.Extensions.DependencyInjection.dll",
            "Microsoft.Extensions.DependencyInjection.Abstractions.dll",
            "SQLitePCLRaw.core.dll",
            "SQLitePCLRaw.batteries_v2.dll",
            "SQLitePCLRaw.provider.e_sqlite3.dll",
            "WebView2Loader.dll"
          )
          Get-ChildItem -Recurse | Where-Object { 
            -not ($keep -contains $_.Name) -and 
            -not ($_.Name -like "*.pdb") -and 
            -not ($_.Name -like "*.xml") 
          } | Remove-Item -Force -Recurse -ErrorAction SilentlyContinue
          Get-ChildItem -Directory -Recurse | Where-Object { $_.GetFileSystemInfos().Count -eq 0 } | Remove-Item -Force -Recurse
        shell: pwsh

      - name: 📦 Create Minimal Zip
        run: Compress-Archive -Path publish\* -DestinationPath TB-Browser-Minimal.zip -Force
        shell: pwsh

      - name: 📤 Upload Minimal Artifact
        uses: actions/upload-artifact@v7
        with:
          name: TB-Browser-Minimal
          path: TB-Browser-Minimal.zip
          if-no-files-found: error
          retention-days: 30
