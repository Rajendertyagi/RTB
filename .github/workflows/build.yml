name: Build TB (WinUI 3 Phase 1)
on: [push, workflow_dispatch]
env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with: { token: ${{ secrets.GITHUB_TOKEN }}, persist-credentials: false }

      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: '8.0.x' }

      - name: Clean Workspace
        run: |
          Remove-Item *.zip -Force -ErrorAction SilentlyContinue
          Remove-Item bin,obj -Recurse -Force -ErrorAction SilentlyContinue

      - run: dotnet restore
      - run: dotnet build TB.csproj -c Release

      - name: Publish
        run: dotnet publish TB.csproj -c Release -r win-x64 --self-contained false

      - name: Create Portable ZIP
        run: |
          $pub = "bin/Release/net8.0-windows10.0.19041.0/win-x64"
          Compress-Archive -Path "$pub/*" -DestinationPath TB-Portable.zip -Force

      - uses: actions/upload-artifact@v5
        with:
          name: TB-Portable
          path: TB-Portable.zip
          if-no-files-found: error
          retention-days: 14
