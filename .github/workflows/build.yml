name: Build TB (Phase 1)
on: [push, workflow_dispatch]
env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5

      # Use stable .NET 9 (or 8) – .NET 10 preview is not yet fully compatible
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      # Restore and publish self-contained, unpackaged WinUI 3 app
      - run: dotnet restore

      - name: Publish self-contained WinUI 3 app
        run: |
          dotnet publish -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -o ./publish

      # Optional: verify the .exe runs (smoke test)
      - run: ./publish/YourAppName.exe --help || echo "Smoke test not possible, check manually"

      - name: Package output as zip
        run: Compress-Archive -Path publish\* -DestinationPath TB-Portable.zip -Force

      - uses: actions/upload-artifact@v7
        with:
          name: TB-Portable
          path: TB-Portable.zip
          retention-days: 14
