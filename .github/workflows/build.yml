name: Build TB (Avalonia Phase 1)
on: [push, workflow_dispatch]
env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: '10.0.x' }

      - name: Clean & Restore
        run: |
          rm -rf obj bin publish
          # ✅ Restore with explicit RID to generate win-x64 assets
          dotnet restore TB.csproj -r win-x64

      - name: Build
        run: dotnet build TB.csproj --configuration Release --no-restore -r win-x64

      - name: Publish Windows
        run: |
          dotnet publish TB.csproj -c Release -r win-x64 --self-contained false
          mkdir -p publish
          cp -r bin/Release/net10.0-windows/win-x64/* publish/
          find publish -name "*.zip" -delete

      - name: Create ZIP
        run: |
          cd publish
          zip -r ../TB-Portable.zip .
          cd ..

      - uses: actions/upload-artifact@v7
        with:
          name: TB-Portable
          path: TB-Portable.zip
          retention-days: 14
