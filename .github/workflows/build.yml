name: Build TB (WinUI 3 SDK 2.1)
on: [push, workflow_dispatch]
env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Clean Workspace
        run: |
          Remove-Item *.zip -Force -ErrorAction SilentlyContinue
          Remove-Item bin,obj -Recurse -Force -ErrorAction SilentlyContinue

      - run: dotnet restore
      - run: dotnet build TB.csproj -c Release

      - name: Publish
        run: dotnet publish TB.csproj -c Release -r win-x64 --self-contained false

      - name: Create Portable ZIP (Flat Structure)
        run: |
          # ✅ Remove stale artifacts
          Remove-Item *.zip -Force -ErrorAction SilentlyContinue
          
          # ✅ Define paths
          $publishDir = "bin/Release/net8.0-windows10.0.26100.0/win-x64"
          $zipPath = "TB-Portable.zip"
          
          # ✅ Create flat ZIP: contents of publish/ directly in root of zip (no nested "publish/" folder)
          Push-Location $publishDir
          Compress-Archive -Path * -DestinationPath "../../../$zipPath" -Force
          Pop-Location
          
          # ✅ Verify ZIP contents (debug output)
          Write-Host "=== ZIP Contents ==="
          Expand-Archive -Path $zipPath -DestinationPath "./verify" -Force
          Get-ChildItem -Path "./verify" -Recurse | Select-Object FullName
          Remove-Item "./verify" -Recurse -Force

      - uses: actions/upload-artifact@v7
        with:
          name: TB-Portable
          path: TB-Portable.zip
          if-no-files-found: error
          retention-days: 14
          compression-level: 6
