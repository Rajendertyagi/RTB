name: Build TB Browser (WinUI 3)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_CLI_UI_LANGUAGE: en
  CONFIGURATION: Release
  RUNTIME: win-x64
  EnableWindowsTargeting: true

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ⚙️ Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: 📥 Install Windows Desktop Workload & Restore
        run: |
          dotnet workload install windows-desktop
          dotnet restore
        shell: pwsh

      - name: 🧹 Force Clean Stale Artifacts
        run: |
          Remove-Item -Recurse -Force obj, bin -ErrorAction SilentlyContinue
          dotnet clean -c ${{ env.CONFIGURATION }}
        shell: pwsh

      - name: 🔨 Build & Publish (Framework-Dependent)
        run: >
          dotnet publish
          -c ${{ env.CONFIGURATION }}
          -r ${{ env.RUNTIME }}
          --self-contained false
          -p:SelfContained=false
          -p:PublishSingleFile=false
          -p:PublishTrimmed=false
          -p:EnableWindowsTargeting=true
          -p:WindowsPackageType=None
          -p:AllowUnsafeBlocks=true
          -p:GenerateLibraryLayout=false
          -o ./publish
        shell: pwsh

      - name: 🧹 Strip Debug Files & Unused Runtimes
        run: |
          Set-Location ./publish
          # Remove only safe-to-delete files without breaking WinUI 3 XAML/WinRT loading
          Get-ChildItem -Recurse -Include *.pdb, *.xml, *.dev.json, *.nuspec | Remove-Item -Force -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force runtimes -ErrorAction SilentlyContinue
        shell: pwsh

      - name: 📦 Create Minimal Zip
        run: Compress-Archive -Path publish\* -DestinationPath TB-Browser-Minimal.zip -Force
        shell: pwsh

      - name: 📤 Upload Minimal Artifact
        uses: actions/upload-artifact@v7
        with:
          name: TB-Browser-Minimal
          path: TB-Browser-Minimal.zip
          if-no-files-found: error
          retention-days: 30
