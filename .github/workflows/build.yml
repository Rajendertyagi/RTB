name: Test WinUI 3 Unpackaged
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      
      - run: dotnet restore
      - run: dotnet build -c Release
      
      - name: Publish
        run: dotnet publish -c Release -r win-x64 --self-contained false
      
      - name: Zip
        run: |
          Remove-Item *.zip -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path ./bin/Release/net8.0-windows10.0.19041.0/win-x64/* -DestinationPath TestWinUI3-Portable.zip -Force
      
      - uses: actions/upload-artifact@v4
        with:
          name: TestWinUI3-Portable
          path: TestWinUI3-Portable.zip
