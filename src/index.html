<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TB</title>
  <link rel="stylesheet" href="tabs.css">
  <style>
    /* ... Keep existing global/nav styles here ... */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #202124; color: #fff; font-family: system-ui; height: 80px; display: flex; flex-direction: column; overflow: hidden; }
    .titlebar { display: flex; align-items: center; background: #292a2d; height: 40px; -webkit-app-region: drag; }
    .window-controls { display: flex; gap: 2px; padding-right: 8px; -webkit-app-region: no-drag; }
    .win-btn { width: 44px; height: 36px; border: none; background: transparent; color: #fff; cursor: pointer; font-size: 16px; }
    .win-btn:hover { background: #35363a; }
    #close-btn:hover { background: #e81123 !important; }
    .nav { display: flex; align-items: center; gap: 8px; padding: 8px; background: #292a2d; flex-shrink: 0; }
    .nav-btn { width: 32px; height: 32px; border: none; background: transparent; color: #9aa0a6; border-radius: 50%; cursor: pointer; font-size: 16px; }
    .nav-btn:hover { background: #35363a; color: #fff; }
    #url { flex: 1; padding: 6px 12px; border-radius: 18px; border: none; background: #303134; color: #fff; outline: none; }
    #go { padding: 6px 16px; background: #5f6368; border: none; color: #fff; border-radius: 18px; cursor: pointer; }
    #go:hover { background: #70757a; }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="tabs" id="tabs"></div>
    <div class="window-controls">
      <button class="win-btn" onclick="window.__TAURI__.window.getCurrent().minimize()">─</button>
      <button class="win-btn" onclick="window.__TAURI__.window.getCurrent().toggleMaximize()">□</button>
      <button class="win-btn" id="close-btn" onclick="window.__TAURI__.window.getCurrent().close()">✕</button>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn" onclick="window.__TAURI__.core.invoke('go_back')">←</button>
    <button class="nav-btn" onclick="window.__TAURI__.core.invoke('go_forward')">→</button>
    <button class="nav-btn" onclick="window.__TAURI__.core.invoke('reload')">⟳</button>
    <input id="url" placeholder="Search or enter URL" onkeydown="if(event.key==='Enter')navigate()">
    <button id="go" onclick="navigate()">Go</button>
  </div>
  
  <script>
    const invoke = window.__TAURI__.core.invoke;
    
    async function navigate() {
      let val = document.getElementById('url').value;
      if (!val.startsWith('http')) val = 'https://' + val;
      window.Tabs.updateUrl(val);
      await invoke('navigate', { url: val });
    }
  </script>
  <script src="tabs.js"></script>
</body>
</html>
