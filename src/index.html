<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TB Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #202124;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    /* Chrome-like toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: #292a2d;
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    .nav-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: #9aa0a6;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      -webkit-app-region: no-drag;
    }
    .nav-btn:hover { background: #35363a; color: #fff; }
    .url-bar {
      flex: 1;
      display: flex;
      align-items: center;
      background: #303134;
      border-radius: 18px;
      padding: 6px 12px;
      -webkit-app-region: no-drag;
    }
    #url {
      flex: 1;
      border: none;
      background: transparent;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    #go {
      margin-left: 8px;
      padding: 4px 12px;
      background: #5f6368;
      border: none;
      color: #fff;
      border-radius: 12px;
      cursor: pointer;
      font-size: 13px;
    }
    #go:hover { background: #70757a; }
    /* Browser content */
    #browser {
      flex: 1;
      border: none;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="nav-btn" onclick="back()" title="Back">←</button>
    <button class="nav-btn" onclick="forward()" title="Forward">→</button>
    <button class="nav-btn" onclick="reload()" title="Reload">⟳</button>
    <div class="url-bar">
      <input id="url" placeholder="Search or enter URL" onkeydown="if(event.key==='Enter')navigate()">
      <button id="go" onclick="navigate()">Go</button>
    </div>
  </div>
  <iframe id="browser" src="https://www.bing.com" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>

  <script>
    function navigate() {
      let val = document.getElementById('url').value;
      if (!val.startsWith('http')) val = 'https://' + val;
      document.getElementById('browser').src = val;
    }
    function back() {
      try { document.getElementById('browser').contentWindow.history.back(); } catch(e){}
    }
    function forward() {
      try { document.getElementById('browser').contentWindow.history.forward(); } catch(e){}
    }
    function reload() {
      const iframe = document.getElementById('browser');
      iframe.src = iframe.src;
    }
  </script>
</body>
</html>
